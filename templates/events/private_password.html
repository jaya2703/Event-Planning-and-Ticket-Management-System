{% extends 'base.html' %}
{% block title %}Private Event Access{% endblock %}
{% block body_class %}ep-site{% endblock %}
{% block content %}
<div class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg p-4 text-center border-0" style="max-width: 400px; border-radius: 15px; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);">
        <div class="mb-4">
            <span class="display-3 text-warning"><i class="bi bi-lock-fill"></i></span>
        </div>
        <h4 class="fw-bold text-dark mb-2">Private Event</h4>
        <p class="text-muted small mb-4">This event is password protected. Please enter the passcode to view details and register.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <input type="password" class="form-control text-center" id="event_private_password" name="event_private_password" placeholder="Enter Access Code" required>
            </div>
            <button type="submit" class="btn ep-btn-primary w-100"><i class="bi bi-key me-1"></i>Unlock Event</button>
        </form>
        <div class="mt-3">
            <a href="{% url 'events:list' %}" class="small text-muted"><i class="bi bi-arrow-left me-1"></i>Back to Directory</a>
        </div>
    </div>
</div>
{% endblock %}
