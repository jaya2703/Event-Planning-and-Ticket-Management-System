{% extends 'base.html' %}
{% block title %}Delete Event{% endblock %}
{% block content %}
<div class="container em-container ep-page-wrap">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="ep-card p-4 text-center">
                <div class="ep-page-icon bg-danger mx-auto mb-3"><i class="bi bi-trash text-white"></i></div>
                <h4 class="fw-bold">Delete Event?</h4>
                <p class="text-muted">You are about to delete <strong>{{ event.title }}</strong>. This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="{% url 'events:detail' event.id %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
