{% extends 'base.html' %}
{% block title %}Edit Volunteer{% endblock %}
{% block content %}
<div class="container ep-page-wrap col-md-6">
    <a href="{% url 'volunteers:manage' event.id %}" class="ep-back-link"><i class="bi bi-arrow-left"></i> Back</a>
    <div class="ep-ent-card mt-3">
        <h5 class="fw-bold mb-3">Edit {{ volunteer.name }}</h5>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label small fw-semibold">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="btn ep-btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
