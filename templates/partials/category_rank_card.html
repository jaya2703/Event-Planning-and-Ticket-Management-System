<div class="ep-cat-rank-card">
    <div class="ep-cat-rank-top">
        <div>
            <span class="ep-cat-rank-eyebrow">Distribution</span>
            <div class="ep-cat-rank-total-wrap">
                <span class="ep-cat-rank-total-val" id="{{ container_id }}-total">—</span>
                <span class="ep-cat-rank-total-lbl" id="{{ container_id }}-total-lbl"></span>
            </div>
        </div>
        <span class="ep-cat-rank-count-badge" id="{{ container_id }}-badge">0 categories</span>
    </div>
    <div class="ep-cat-rank-list" id="{{ container_id }}-list" aria-label="Category revenue distribution"></div>
    <p class="ep-cat-rank-empty d-none" id="{{ container_id }}-empty">No category revenue data yet.</p>
</div>
