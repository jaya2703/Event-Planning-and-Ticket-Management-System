{% extends 'accounts/auth_base.html' %}
{% block title %}Set New Password{% endblock %}

{% block auth_content %}
<div class="container">
    <div class="row justify-content-center align-items-center ep-auth-center">
        <div class="col-md-5">
            <div class="ep-auth-card">
                <h3 class="fw-bold mb-4">Set New Password</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn ep-btn-primary w-100 mt-3">Save Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
