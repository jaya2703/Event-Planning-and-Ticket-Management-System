{% extends 'base.html' %}
{% block title %}Check Your Email{% endblock %}
{% block content %}
<div class="ep-auth-page">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-80">
            <div class="col-md-5 text-center">
                <div class="ep-auth-card">
                    <div class="ep-auth-logo bg-success"><i class="bi bi-check-circle-fill text-white"></i></div>
                    <h3 class="fw-bold mt-3">Email Sent!</h3>
                    <p class="text-muted">Check your email for password reset instructions. (Check console in development mode)</p>
                    <a href="{% url 'accounts:login' %}" class="btn ep-btn-primary">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
