{% extends 'accounts/auth_base.html' %}
{% block title %}Password Reset Complete{% endblock %}

{% block auth_content %}
<div class="container">
    <div class="row justify-content-center align-items-center ep-auth-center">
        <div class="col-md-5 text-center">
            <div class="ep-auth-card">
                <div class="ep-auth-logo bg-success"><i class="bi bi-check2-circle text-white"></i></div>
                <h3 class="fw-bold mt-3">Password Reset!</h3>
                <p class="text-muted">Your password has been reset. You can now log in.</p>
                <a href="{% url 'accounts:login' %}" class="btn ep-btn-primary">Go to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
