{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="container em-container ep-page-wrap">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="ep-card p-4">
                <h4 class="fw-bold mb-4">Change Password</h4>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        <input type="password" name="{{ field.html_name }}" class="form-control ep-input" placeholder="{{ field.label }}">
                        {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn ep-btn-primary w-100">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
