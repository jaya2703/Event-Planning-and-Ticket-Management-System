{% extends 'accounts/auth_base.html' %}
{% block title %}Reset Password{% endblock %}

{% block auth_content %}
<div class="container">
    <div class="row justify-content-center align-items-center ep-auth-center">
        <div class="col-md-5">
            <div class="ep-auth-card">
                <div class="text-center mb-4">
                    <div class="ep-auth-logo"><i class="bi bi-key-fill"></i></div>
                    <h2 class="fw-bold mt-3">Forgot Password?</h2>
                    <p class="text-muted">Enter your email to reset your password</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <div class="input-group ep-input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control ep-input" placeholder="Your registered email" required>
                        </div>
                    </div>
                    <button type="submit" class="btn ep-btn-primary w-100">Send Reset Link</button>
                </form>
                <p class="text-center mt-3"><a href="{% url 'accounts:login' %}">Back to Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
