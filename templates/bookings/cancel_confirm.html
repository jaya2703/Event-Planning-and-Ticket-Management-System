{% extends 'base.html' %}
{% block title %}Cancel Booking{% endblock %}
{% block content %}
<div class="container em-container ep-page-wrap">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="ep-card p-4 text-center">
                <div class="ep-page-icon bg-danger mx-auto mb-3"><i class="bi bi-x-circle text-white"></i></div>
                <h4 class="fw-bold">Cancel This Booking?</h4>
                <p class="text-muted">You are about to cancel your booking for <strong>{{ booking.event.title }}</strong>.</p>
                <div class="ep-info-box mb-4">
                    <p class="mb-1 small"><i class="bi bi-info-circle me-1 text-info"></i>
                    If someone is on the waitlist, they will automatically get your spot.</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="{% url 'bookings:detail' booking.id %}" class="btn btn-outline-secondary">Keep Booking</a>
                        <button type="submit" class="btn btn-danger">Yes, Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
